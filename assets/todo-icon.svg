<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F2F8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Clipboard / board -->
  <g filter="url(#softShadow)">
    <rect x="262" y="200" width="500" height="624" rx="48" fill="url(#boardGrad)"/>
  </g>

  <!-- Clip at top -->
  <rect x="412" y="160" width="200" height="88" rx="28" fill="#3730A3"/>
  <rect x="442" y="178" width="140" height="52" rx="16" fill="#FFFFFF"/>

  <!-- Checklist item 1 -->
  <rect x="326" y="356" width="72" height="72" rx="20" fill="#22C55E"/>
  <path d="M348 392 L364 408 L398 368" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="430" y="372" width="266" height="24" rx="12" fill="#3730A3" opacity="0.85"/>

  <!-- Checklist item 2 -->
  <rect x="326" y="476" width="72" height="72" rx="20" fill="#22C55E"/>
  <path d="M348 512 L364 528 L398 488" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="430" y="492" width="226" height="24" rx="12" fill="#3730A3" opacity="0.85"/>

  <!-- Checklist item 3 (unchecked) -->
  <rect x="326" y="596" width="72" height="72" rx="20" fill="none" stroke="#C7CAE4" stroke-width="10"/>
  <rect x="430" y="612" width="286" height="24" rx="12" fill="#C7CAE4"/>

  <!-- Checklist item 4 (unchecked, shorter) -->
  <rect x="326" y="716" width="72" height="72" rx="20" fill="none" stroke="#C7CAE4" stroke-width="10"/>
  <rect x="430" y="732" width="190" height="24" rx="12" fill="#C7CAE4"/>
</svg>
